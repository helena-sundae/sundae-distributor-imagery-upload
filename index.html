<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sundae Photo Upload</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
    .form-wrap { max-width: 680px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; color: #1a1a1a; }
    .section-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    .section-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field-label { display: block; font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
    input[type="text"], input[type="date"], textarea {
      width: 100%; font-size: 14px; font-family: inherit;
      background: #f9f9f8; border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px; color: #1a1a1a; padding: 8px 12px;
      outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="date"]:focus, textarea:focus { border-color: rgba(0,0,0,0.5); }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-list { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #1a1a1a; cursor: pointer; }
    .checkbox-item input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #3a7bd5; flex-shrink: 0; }
    .other-comment { margin-top: 8px; margin-left: 23px; display: none; }
    .drop-zone {
      border: 1.5px dashed rgba(0,0,0,0.2); border-radius: 12px;
      padding: 2rem 1rem; text-align: center; cursor: pointer; transition: background 0.15s;
    }
    .drop-zone:hover, .drop-zone.dragover { background: #f5f5f3; }
    .drop-zone-icon { font-size: 28px; margin-bottom: 8px; }
    .drop-zone p { margin: 4px 0; font-size: 14px; color: #666; }
    .drop-zone .hint { font-size: 12px; color: #aaa; }
    .btn-row { display: flex; gap: 10px; margin-top: 1rem; justify-content: flex-end; }
    .btn-choose {
      font-size: 14px; font-weight: 500; padding: 8px 18px;
      border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px;
      background: #f5f5f3; color: #1a1a1a; cursor: pointer;
    }
    .btn-upload {
      font-size: 14px; font-weight: 500; padding: 8px 22px;
      border: none; border-radius: 8px;
      background: #1a1a1a; color: #fff; cursor: pointer;
    }
    .btn-choose:hover { background: #ebebea; }
    .btn-upload:hover { background: #333; }
    .btn-upload:disabled { background: #999; cursor: not-allowed; }
    .file-list { margin-top: 1rem; display: none; }
    .file-list-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 8px; }
    .file-item {
      display: flex; align-items: center; gap: 10px;
      padding: 10px 12px; background: #f9f9f8;
      border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; margin-bottom: 6px;
    }
    .file-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; margin-left: 6px; }
    .badge-pdf { background: #faece7; color: #993c1d; }
    .badge-img { background: #e6f1fb; color: #185fa5; }
    .badge-txt { background: #eaf3de; color: #3b6d11; }
    .progress-bar-wrap { display: none; margin-top: 10px; background: #eee; border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: #3a7bd5; border-radius: 99px; width: 0%; transition: width 0.2s; }
    .status-msg { display: none; font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-top: 10px; }
    .status-success { background: #eaf3de; color: #3b6d11; border: 0.5px solid #c0dd97; }
    .status-error { background: #fcebeb; color: #a32d2d; border: 0.5px solid #f7c1c1; }
    .required { color: #c0392b; margin-left: 2px; }
    @media (max-width: 480px) { .checkbox-grid { grid-template-columns: 1fr; } }
  </style>
</head>

  <div class="section-card">
    <p class="section-title">Type of image</p>
    <div class="checkbox-list">
      <label class="checkbox-item"><input type="checkbox" name="img_type" value="Sundae on-shelf"> Sundae on-shelf</label>
      <label class="checkbox-item"><input type="checkbox" name="img_type" value="Sundae secondary placement display"> Sundae secondary placement display (end-cap, sidekick, aisle fin, etc.)</label>
      <label class="checkbox-item"><input type="checkbox" name="img_type" value="Competitor product"> Competitor product</label>
      <label class="checkbox-item"><input type="checkbox" name="img_type" value="other" id="otherCheck"> Other</label>
      <div class="other-comment" id="otherCommentBox">
        <input type="text" id="otherComment" placeholder="Please describe the image type…">
      </div>
    </div>
  </div>

  <div class="section-card">
    <p class="section-title">Store details</p>
    <div class="field">
      <label class="field-label">Country <span class="required">*</span></label>
      <select id="country" style="width:100%;font-size:14px;font-family:inherit;background:#f9f9f8;border:0.5px solid rgba(0,0,0,0.2);border-radius:8px;color:#1a1a1a;padding:8px 12px;outline:none;">
        <option value="">— Select your country —</option>
        <option value="AUS">Australia</option>
        <option value="NZ">New Zealand</option>
        <option value="UK">United Kingdom</option>
        <option value="USA">USA</option>
        <option value="IRE">Ireland</option>
        <option value="SCA">Scandinavia</option>
        <option value="NED">Netherlands</option>
        <option value="BEL">Belgium</option>
        <option value="THA">Thailand</option>
        <option value="SWI">Switzerland</option>
        <option value="POL">Poland</option>
        <option value="BAL">Baltics</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">Name of retailer <span class="required">*</span></label>
      <input type="text" id="retailer" placeholder="e.g. Boots, Superdrug, Tesco">
    </div>
    <div class="field">
      <label class="field-label">Store location <span class="required">*</span></label>
      <input type="text" id="location" placeholder="e.g. Oxford Street London">
    </div>
    <div class="field">
      <label class="field-label">Date photo was taken <span class="required">*</span></label>
      <input type="date" id="photo_date">
    </div>
  </div>

  <div class="section-card">
    <p class="section-title">Product on display</p>
    <div class="checkbox-grid">
      <label class="checkbox-item"><input type="checkbox" name="product" value="Shower Foams"> Shower Foams</label>
      <label class="checkbox-item"><input type="checkbox" name="product" value="Body Mists"> Body Mists</label>
      <label class="checkbox-item"><input type="checkbox" name="product" value="Body Whips"> Body Whips</label>
      <label class="checkbox-item"><input type="checkbox" name="product" value="Suncare"> Suncare</label>
      <label class="checkbox-item"><input type="checkbox" name="product" value="Kids Collection"> Kids Collection</label>
    </div>
  </div>

  <div class="section-card">
    <p class="section-title">Additional comments / notes</p>
    <textarea id="comments" placeholder="Any extra context, observations, or notes…"></textarea>
  </div>

  <div class="section-card">
    <p class="section-title">Upload photos</p>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-zone-icon">📷</div>
      <p>Drop files here or click to browse</p>
      <p class="hint">Accepted: JPG, PNG, GIF, PDF, TXT — multiple files allowed</p>
    </div>
    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.gif,.pdf,.txt" multiple style="display:none">

    <div class="file-list" id="fileList">
      <p class="file-list-title">Selected files</p>
      <div id="fileItems"></div>
    </div>

    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="btn-row">
      <button class="btn-choose" onclick="document.getElementById('fileInput').click()">Choose files</button>
      <button class="btn-upload" id="uploadBtn" onclick="handleUpload()">Upload</button>
    </div>

    <div class="status-msg status-success" id="successMsg">✓ Submission uploaded successfully to Dropbox!</div>
    <div class="status-msg status-error" id="errorMsg"></div>
  </div>
</div>

<script>
  // --- Other checkbox toggle ---
  document.getElementById('otherCheck').addEventListener('change', function() {
    const box = document.getElementById('otherCommentBox');
    box.style.display = this.checked ? 'block' : 'none';
    if (!this.checked) document.getElementById('otherComment').value = '';
  });

  // --- File preview ---
  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');

  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(2) + ' MB';
  }

  function getBadge(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (ext === 'pdf') return '<span class="badge badge-pdf">PDF</span>';
    if (['jpg','jpeg','png','gif'].includes(ext)) return '<span class="badge badge-img">Image</span>';
    if (ext === 'txt') return '<span class="badge badge-txt">TXT</span>';
    return '';
  }

  function getIconStyle(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (ext === 'pdf') return 'background:#faece7;color:#993c1d;';
    if (['jpg','jpeg','png','gif'].includes(ext)) return 'background:#e6f1fb;color:#185fa5;';
    if (ext === 'txt') return 'background:#eaf3de;color:#3b6d11;';
    return 'background:#eee;color:#666;';
  }

  function getIconLabel(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (['jpg','jpeg','png','gif'].includes(ext)) return 'IMG';
    return ext.toUpperCase().slice(0, 3);
  }

  function renderFiles(files) {
    const list = document.getElementById('fileList');
    const items = document.getElementById('fileItems');
    items.innerHTML = '';
    if (!files || !files.length) { list.style.display = 'none'; return; }
    list.style.display = 'block';
    Array.from(files).forEach(f => {
      const d = document.createElement('div');
      d.className = 'file-item';
      d.innerHTML = `<div class="file-icon" style="${getIconStyle(f.name)}">${getIconLabel(f.name)}</div>
        <div class="file-info">
          <div class="file-name">${f.name}${getBadge(f.name)}</div>
          <div class="file-meta">${formatSize(f.size)} · ${f.type || 'unknown type'}</div>
        </div>`;
      items.appendChild(d);
    });
  }

  fileInput.addEventListener('change', () => renderFiles(fileInput.files));
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) { fileInput.files = e.dataTransfer.files; renderFiles(e.dataTransfer.files); }
  });

  // --- Build safe filename prefix ---
  function slugify(str) {
    return str.trim().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_\-]/g, '');
  }

  // --- Upload to Dropbox ---
  async function uploadToDropbox(file, path) {
    const res = await fetch('https://content.dropboxapi.com/2/files/upload', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + DROPBOX_TOKEN,
        'Dropbox-API-Arg': JSON.stringify({ path, mode: 'add', autorename: true, mute: false }),
        'Content-Type': 'application/octet-stream'
      },
      body: file
    });
    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.error_summary || 'Upload failed');
    }
    return res.json();
  }

  // --- Main submit handler ---
  async function handleUpload() {
    const country = document.getElementById('country').value.trim();
    const retailer = document.getElementById('retailer').value.trim();
    const location = document.getElementById('location').value.trim();
    const date = document.getElementById('photo_date').value;
    const comments = document.getElementById('comments').value.trim();
    const files = fileInput.files;
    const imgTypes = [...document.querySelectorAll('input[name="img_type"]:checked')].map(c => c.value);
    const otherChecked = document.getElementById('otherCheck').checked;
    const otherComment = document.getElementById('otherComment').value.trim();
    const products = [...document.querySelectorAll('input[name="product"]:checked')].map(c => c.value);

    // Validation
    if (!country || !retailer || !location || !date) {
      return showError('Please fill in all required store details (country, retailer, location, date).');
    }
    if (imgTypes.length === 0) return showError('Please select at least one image type.');
    if (otherChecked && !otherComment) return showError('Please describe the "Other" image type.');
    if (!files || !files.length) return showError('Please select at least one file to upload.');
    if (DROPBOX_TOKEN === 'PASTE_YOUR_DROPBOX_ACCESS_TOKEN_HERE') {
      return showError('No Dropbox token found. Please add your access token to the HTML file.');
    }

    // Build prefix: Country_Retailer_StoreLocation_Date
    const prefix = [slugify(country), slugify(retailer), slugify(location), slugify(date)].join('_');

    const btn = document.getElementById('uploadBtn');
    btn.disabled = true;
    btn.textContent = 'Uploading…';
    hideMessages();
    showProgress(0);

    try {
      const total = files.length + 1; // +1 for summary txt
      let done = 0;

      // Build image type shortcodes
      const imgTypeMap = {
        'Sundae on-shelf': 'shelf',
        'Sundae secondary placement display': 'secondary',
        'Competitor product': 'competitor',
        'other': 'other'
      };
      const imgTypeCodes = imgTypes.map(v => imgTypeMap[v] || 'other').join('_');

      // Build product shortcodes (remove spaces)
      const productCodes = products.map(p => slugify(p.replace(/\s+/g, ''))).join('_');

      // Final prefix: Country_Retailer_Location_Products_ImageTypes_Date
      const prefix = [
        slugify(country),
        slugify(retailer),
        slugify(location),
        productCodes || 'NoProduct',
        imgTypeCodes || 'NoType',
        slugify(date)
      ].join('_');

      // Upload each file with renamed prefix
      let fileIndex = 1;
      for (const file of Array.from(files)) {
        const ext = file.name.includes('.') ? file.name.split('.').pop() : '';
        const newName = prefix + '_' + fileIndex + (ext ? '.' + ext : '');
        const path = DROPBOX_FOLDER + '/' + slugify(country) + '/' + newName;
        await uploadToDropbox(file, path);
        done++;
        fileIndex++;
        showProgress(Math.round((done / total) * 100));
      }

      // Build and upload summary .txt
      const imgTypesFull = imgTypes.map(v => v === 'other' ? 'Other: ' + otherComment : v);
      const summary = [
        'SUNDAE PHOTO SUBMISSION SUMMARY',
        '================================',
        'Submitted: ' + new Date().toLocaleString(),
        '',
        'TYPE OF IMAGE:',
        imgTypesFull.map(t => '  - ' + t).join('\n'),
        '',
        'STORE DETAILS:',
        '  Country:        ' + country,
        '  Retailer:       ' + retailer,
        '  Store location: ' + location,
        '  Date taken:     ' + date,
        '',
        'PRODUCTS ON DISPLAY:',
        products.length ? products.map(p => '  - ' + p).join('\n') : '  None selected',
        '',
        'ADDITIONAL COMMENTS:',
        comments || '  None',
        '',
        'FILES UPLOADED:',
        Array.from(files).map(f => '  - ' + f.name + ' (' + formatSize(f.size) + ')').join('\n')
      ].join('\n');

      const summaryBlob = new Blob([summary], { type: 'text/plain' });
      const summaryFile = new File([summaryBlob], prefix + '_summary.txt');
      await uploadToDropbox(summaryFile, DROPBOX_FOLDER + '/' + slugify(country) + '/' + prefix + '_summary.txt');
      done++;
      showProgress(100);

      // Send data to Google Sheets
      const imgTypesFull2 = [...document.querySelectorAll('input[name="img_type"]:checked')].map(c => c.value === 'other' ? 'Other: ' + otherComment : c.value);
      const products2 = [...document.querySelectorAll('input[name="product"]:checked')].map(c => c.value);
      await fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          dateSubmitted: new Date().toLocaleString(),
          country: country,
          retailer: retailer,
          storeLocation: location,
          datePhotoTaken: date,
          imageType: imgTypesFull2.join(', '),
          products: products2.join(', '),
          comments: comments,
          filesUploaded: Array.from(files).map(f => f.name).join(', ')
        })
      });

      document.getElementById('successMsg').style.display = 'block';
      resetForm();
    } catch (err) {
      showError('Upload failed: ' + err.message);
    } finally {
      btn.disabled = false;
      btn.textContent = 'Upload';
      setTimeout(() => hideProgress(), 1500);
    }
  }

  function showProgress(pct) {
    document.getElementById('progressWrap').style.display = 'block';
    document.getElementById('progressBar').style.width = pct + '%';
  }
  function hideProgress() { document.getElementById('progressWrap').style.display = 'none'; }
  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = '✕ ' + msg;
    el.style.display = 'block';
  }
  function hideMessages() {
    document.getElementById('successMsg').style.display = 'none';
    document.getElementById('errorMsg').style.display = 'none';
  }
  function resetForm() {
    document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
    document.getElementById('otherCommentBox').style.display = 'none';
    document.getElementById('otherComment').value = '';
    document.getElementById('country').value = '';
    document.getElementById('retailer').value = '';
    document.getElementById('location').value = '';
    document.getElementById('photo_date').value = '';
    document.getElementById('comments').value = '';
    fileInput.value = '';
    renderFiles(null);
  }
</script>
</body>
</html>
