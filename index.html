<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sundae Photo Upload</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; min-height: 100vh; padding: 2rem 1rem; }
    .form-wrap { max-width: 680px; margin: 0 auto; }
    h1 { font-size: 22px; font-weight: 500; margin-bottom: 1.5rem; color: #1a1a1a; }
    .section-card { background: #fff; border: 0.5px solid rgba(0,0,0,0.12); border-radius: 12px; padding: 1.25rem 1.5rem; margin-bottom: 1rem; }
    .section-title { font-size: 12px; font-weight: 500; color: #888; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 1rem; }
    .field { margin-bottom: 1rem; }
    .field:last-child { margin-bottom: 0; }
    .field-label { display: block; font-size: 14px; font-weight: 500; color: #1a1a1a; margin-bottom: 6px; }
    input[type="text"], input[type="date"], textarea, select {
      width: 100%; font-size: 14px; font-family: inherit;
      background: #f9f9f8; border: 0.5px solid rgba(0,0,0,0.2);
      border-radius: 8px; color: #1a1a1a; padding: 8px 12px;
      outline: none; transition: border-color 0.15s;
    }
    input[type="text"]:focus, input[type="date"]:focus, textarea:focus, select:focus { border-color: rgba(0,0,0,0.5); }
    textarea { resize: vertical; min-height: 80px; }
    .checkbox-list { display: flex; flex-direction: column; gap: 8px; }
    .checkbox-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 6px 16px; }
    .checkbox-item { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #1a1a1a; cursor: pointer; }
    .checkbox-item input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: #3a7bd5; flex-shrink: 0; }
    .sub-field { margin-top: 8px; margin-left: 23px; }
    .drop-zone { border: 1.5px dashed rgba(0,0,0,0.2); border-radius: 12px; padding: 2rem 1rem; text-align: center; cursor: pointer; transition: background 0.15s; }
    .drop-zone:hover, .drop-zone.dragover { background: #f5f5f3; }
    .drop-zone-icon { font-size: 28px; margin-bottom: 8px; }
    .drop-zone p { margin: 4px 0; font-size: 14px; color: #666; }
    .drop-zone .hint { font-size: 12px; color: #aaa; }
    .btn-row { display: flex; gap: 10px; margin-top: 1rem; justify-content: flex-end; }
    .btn-choose { font-size: 14px; font-weight: 500; padding: 8px 18px; border: 0.5px solid rgba(0,0,0,0.2); border-radius: 8px; background: #f5f5f3; color: #1a1a1a; cursor: pointer; }
    .btn-upload { font-size: 14px; font-weight: 500; padding: 8px 22px; border: none; border-radius: 8px; background: #1a1a1a; color: #fff; cursor: pointer; }
    .btn-choose:hover { background: #ebebea; }
    .btn-upload:hover { background: #333; }
    .btn-upload:disabled { background: #999; cursor: not-allowed; }
    .file-list { margin-top: 1rem; display: none; }
    .file-list-title { font-size: 13px; font-weight: 500; color: #888; margin-bottom: 8px; }
    .file-item { display: flex; align-items: center; gap: 10px; padding: 10px 12px; background: #f9f9f8; border: 0.5px solid rgba(0,0,0,0.1); border-radius: 8px; margin-bottom: 6px; }
    .file-icon { width: 32px; height: 32px; border-radius: 6px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; flex-shrink: 0; }
    .file-info { flex: 1; min-width: 0; }
    .file-name { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-meta { font-size: 12px; color: #888; margin-top: 2px; }
    .badge { display: inline-block; font-size: 11px; font-weight: 500; padding: 2px 8px; border-radius: 99px; margin-left: 6px; }
    .badge-pdf { background: #faece7; color: #993c1d; }
    .badge-img { background: #e6f1fb; color: #185fa5; }
    .badge-txt { background: #eaf3de; color: #3b6d11; }
    .progress-bar-wrap { display: none; margin-top: 10px; background: #eee; border-radius: 99px; height: 6px; overflow: hidden; }
    .progress-bar { height: 100%; background: #3a7bd5; border-radius: 99px; width: 0%; transition: width 0.2s; }
    .status-msg { display: none; font-size: 13px; padding: 10px 12px; border-radius: 8px; margin-top: 10px; }
    .status-success { background: #eaf3de; color: #3b6d11; border: 0.5px solid #c0dd97; }
    .status-error { background: #fcebeb; color: #a32d2d; border: 0.5px solid #f7c1c1; }
    .required { color: #c0392b; margin-left: 2px; }
    @media (max-width: 480px) { .checkbox-grid { grid-template-columns: 1fr; } }
  </style>
</head>
<body>
<div class="form-wrap">
  <h1>Sundae Photo Upload</h1>

  <!-- Type of image -->
  <div class="section-card">
    <p class="section-title">Type of image</p>
    <div class="checkbox-list">
      <label class="checkbox-item">
        <input type="checkbox" name="img_type" value="Sundae on-shelf"> Sundae on-shelf
      </label>
      <label class="checkbox-item">
        <input type="checkbox" name="img_type" value="Sundae secondary placement display" id="secondaryCheck"> Sundae secondary placement display
      </label>
      <div id="secondaryOptions" style="display:none;" class="sub-field">
        <select id="secondaryType">
          <option value="">— Select placement type —</option>
          <option value="endcap">End-cap</option>
          <option value="sidekick">Sidekick</option>
          <option value="aislefin">Aisle fin</option>
          <option value="other">Other</option>
        </select>
        <div id="secondaryOtherBox" style="display:none; margin-top:6px;">
          <input type="text" id="secondaryOther" placeholder="Please describe the placement type…">
        </div>
      </div>
      <label class="checkbox-item">
        <input type="checkbox" name="img_type" value="Competitor product"> Competitor product
      </label>
      <label class="checkbox-item">
        <input type="checkbox" name="img_type" value="other" id="otherCheck"> Other
      </label>
      <div id="otherCommentBox" style="display:none;" class="sub-field">
        <input type="text" id="otherComment" placeholder="Please describe the image type…">
      </div>
    </div>
  </div>

  <!-- Store details -->
  <div class="section-card">
    <p class="section-title">Store details</p>
    <div class="field">
      <label class="field-label">Country <span class="required">*</span></label>
      <select id="country">
        <option value="">— Select your country —</option>
        <option value="AUS">Australia</option>
        <option value="NZ">New Zealand</option>
        <option value="UK">United Kingdom</option>
        <option value="USA">USA</option>
        <option value="IRE">Ireland</option>
        <option value="SCA">Scandinavia</option>
        <option value="NED">Netherlands</option>
        <option value="BEL">Belgium</option>
        <option value="THA">Thailand</option>
        <option value="SWI">Switzerland</option>
        <option value="POL">Poland</option>
        <option value="BAL">Baltics</option>
      </select>
    </div>
    <div class="field">
      <label class="field-label">Name of retailer <span class="required">*</span></label>
      <input type="text" id="retailer" placeholder="e.g. Boots, Superdrug, Tesco">
    </div>
    <div class="field">
      <label class="field-label">Store location <span class="required">*</span></label>
      <input type="text" id="location" placeholder="e.g. Oxford Street London">
    </div>
    <div class="field">
      <label class="field-label">Date photo was taken <span class="required">*</span></label>
      <input type="date" id="photo_date">
    </div>
  </div>

  <!-- Products on display -->
  <div class="section-card">
    <p class="section-title">Product on display <span class="required">*</span></p>
    <div class="checkbox-grid">
      <label class="checkbox-item"><input type="checkbox" name="product" value="ShowerFoams"> Shower Foams</label>
      <label class="checkbox-item"><input type="checkbox" name="product" value="BodyMists"> Body Mists</label>
      <label class="checkbox-item"><input type="checkbox" name="product" value="BodyWhips"> Body Whips</label>
      <label class="checkbox-item"><input type="checkbox" name="product" value="Suncare"> Suncare</label>
      <label class="checkbox-item"><input type="checkbox" name="product" value="KidsCollection"> Kids Collection</label>
    </div>
  </div>

  <!-- Image description -->
  <div class="section-card">
    <p class="section-title">Image description <span class="required">*</span></p>
    <textarea id="imageDescription" placeholder="Please provide a brief description of your image(s) e.g. Cocktail Collection launch, Mother's Day gift sets, new shelf reset February 2027..."></textarea>
  </div>

  <!-- Comments -->
  <div class="section-card">
    <p class="section-title">Additional comments / notes</p>
    <textarea id="comments" placeholder="Any extra context, observations, or notes…"></textarea>
  </div>

  <!-- File upload -->
  <div class="section-card">
    <p class="section-title">Upload photos</p>
    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
      <div class="drop-zone-icon">📷</div>
      <p>Drop files here or click to browse</p>
      <p class="hint">Accepted: JPG, PNG, GIF, PDF, TXT — multiple files allowed</p>
    </div>
    <input type="file" id="fileInput" accept=".jpg,.jpeg,.png,.gif,.pdf,.txt" multiple style="display:none">
    <div class="file-list" id="fileList">
      <p class="file-list-title">Selected files</p>
      <div id="fileItems"></div>
    </div>
    <div class="progress-bar-wrap" id="progressWrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>
    <div class="btn-row">
      <button class="btn-choose" onclick="document.getElementById('fileInput').click()">Choose files</button>
      <button class="btn-upload" id="uploadBtn" onclick="handleUpload()">Upload</button>
    </div>
    <div class="status-msg status-success" id="successMsg">✓ Submission uploaded successfully!</div>
    <div class="status-msg status-error" id="errorMsg"></div>
  </div>
</div>

<script>
  // ============================================================
  // DROPBOX CREDENTIALS — fill in all three values
  // ============================================================
  const DROPBOX_REFRESH_TOKEN = 'Ycoj9KpNuTwAAAAAAAAAAS5p1XvysVREJZ7ix5fF65MEQDEkqfX54mmCnU-oB_t5';
  const DROPBOX_APP_KEY = 'rfmiw732pag3axo';
  const DROPBOX_APP_SECRET = 'pr6z68ammp8mmwu';
  const DROPBOX_FOLDER = '';
  const SHEETS_URL = 'https://script.google.com/macros/s/AKfycbwDbu43M3SIr9Ga0l_3ZBnw_0O8EPYSFZXzWRfTsCnvik721sMDRrE4PsivvFoQFeen/exec';

  let dropboxAccessToken = null;

  async function getDropboxToken() {
    const res = await fetch('https://api.dropboxapi.com/oauth2/token', {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: 'grant_type=refresh_token&refresh_token=' + DROPBOX_REFRESH_TOKEN + '&client_id=' + DROPBOX_APP_KEY + '&client_secret=' + DROPBOX_APP_SECRET
    });
    const data = await res.json();
    if (!data.access_token) throw new Error('Failed to get Dropbox token');
    dropboxAccessToken = data.access_token;
    return dropboxAccessToken;
  }

  // Secondary placement toggle
  document.getElementById('secondaryCheck').addEventListener('change', function() {
    document.getElementById('secondaryOptions').style.display = this.checked ? 'block' : 'none';
    if (!this.checked) {
      document.getElementById('secondaryType').value = '';
      document.getElementById('secondaryOtherBox').style.display = 'none';
      document.getElementById('secondaryOther').value = '';
    }
  });

  document.getElementById('secondaryType').addEventListener('change', function() {
    document.getElementById('secondaryOtherBox').style.display = this.value === 'other' ? 'block' : 'none';
    if (this.value !== 'other') document.getElementById('secondaryOther').value = '';
  });

  document.getElementById('otherCheck').addEventListener('change', function() {
    document.getElementById('otherCommentBox').style.display = this.checked ? 'block' : 'none';
    if (!this.checked) document.getElementById('otherComment').value = '';
  });

  const fileInput = document.getElementById('fileInput');
  const dropZone = document.getElementById('dropZone');

  function formatSize(b) {
    if (b < 1024) return b + ' B';
    if (b < 1048576) return (b / 1024).toFixed(1) + ' KB';
    return (b / 1048576).toFixed(2) + ' MB';
  }

  function getBadge(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (ext === 'pdf') return '<span class="badge badge-pdf">PDF</span>';
    if (['jpg','jpeg','png','gif'].includes(ext)) return '<span class="badge badge-img">Image</span>';
    if (ext === 'txt') return '<span class="badge badge-txt">TXT</span>';
    return '';
  }

  function getIconStyle(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (ext === 'pdf') return 'background:#faece7;color:#993c1d;';
    if (['jpg','jpeg','png','gif'].includes(ext)) return 'background:#e6f1fb;color:#185fa5;';
    if (ext === 'txt') return 'background:#eaf3de;color:#3b6d11;';
    return 'background:#eee;color:#666;';
  }

  function getIconLabel(name) {
    const ext = name.split('.').pop().toLowerCase();
    if (['jpg','jpeg','png','gif'].includes(ext)) return 'IMG';
    return ext.toUpperCase().slice(0, 3);
  }

  let selectedFiles = [];

  function renderFiles(files) {
    const list = document.getElementById('fileList');
    const items = document.getElementById('fileItems');
    items.innerHTML = '';
    if (!files || !files.length) { list.style.display = 'none'; return; }
    list.style.display = 'block';
    files.forEach((f, index) => {
      const d = document.createElement('div');
      d.className = 'file-item';
      d.innerHTML = `<div class="file-icon" style="${getIconStyle(f.name)}">${getIconLabel(f.name)}</div>
        <div class="file-info">
          <div class="file-name">${f.name}${getBadge(f.name)}</div>
          <div class="file-meta">${formatSize(f.size)} · ${f.type || 'unknown type'}</div>
        </div>
        <button onclick="removeFile(${index})" style="background:none;border:none;cursor:pointer;font-size:16px;color:#aaa;padding:4px 8px;border-radius:6px;flex-shrink:0;" title="Remove file">✕</button>`;
      items.appendChild(d);
    });
  }

  function removeFile(index) {
    selectedFiles.splice(index, 1);
    renderFiles(selectedFiles);
  }

  fileInput.addEventListener('change', () => {
    selectedFiles = [...selectedFiles, ...Array.from(fileInput.files)];
    renderFiles(selectedFiles);
    fileInput.value = '';
  });
  dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
  dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
  dropZone.addEventListener('drop', e => {
    e.preventDefault(); dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) {
      selectedFiles = [...selectedFiles, ...Array.from(e.dataTransfer.files)];
      renderFiles(selectedFiles);
    }
  });

  function slugify(str) {
    return str.trim().replace(/\s+/g, '_').replace(/[^a-zA-Z0-9_\-]/g, '');
  }

  async function uploadToDropbox(file, path) {
    const res = await fetch('https://content.dropboxapi.com/2/files/upload', {
      method: 'POST',
      headers: {
        'Authorization': 'Bearer ' + dropboxAccessToken,
        'Dropbox-API-Arg': JSON.stringify({ path, mode: 'add', autorename: true, mute: false }),
        'Content-Type': 'application/octet-stream'
      },
      body: file
    });
    if (!res.ok) { const err = await res.json(); throw new Error(err.error_summary || 'Upload failed'); }
    return res.json();
  }

  async function getDropboxLink(path) {
    try {
      const res = await fetch('https://api.dropboxapi.com/2/sharing/create_shared_link_with_settings', {
        method: 'POST',
        headers: { 'Authorization': 'Bearer ' + dropboxAccessToken, 'Content-Type': 'application/json' },
        body: JSON.stringify({ path, settings: { requested_visibility: 'public' } })
      });
      const data = await res.json();
      if (data.url) return data.url.replace('?dl=0', '?raw=1');
      if (data.error && data.error['.tag'] === 'shared_link_already_exists') {
        const existing = data.error.shared_link_already_exists;
        if (existing && existing.metadata && existing.metadata.url) {
          return existing.metadata.url.replace('?dl=0', '?raw=1');
        }
        // Fetch existing link if metadata not returned
        const listRes = await fetch('https://api.dropboxapi.com/2/sharing/list_shared_links', {
          method: 'POST',
          headers: { 'Authorization': 'Bearer ' + dropboxAccessToken, 'Content-Type': 'application/json' },
          body: JSON.stringify({ path, direct_only: true })
        });
        const listData = await listRes.json();
        if (listData.links && listData.links.length > 0) {
          return listData.links[0].url.replace('?dl=0', '?raw=1');
        }
      }
      return null;
    } catch(err) {
      console.error('getDropboxLink error:', err);
      return null;
    }
  }

  async function handleUpload() {
    const country = document.getElementById('country').value;
    const retailer = document.getElementById('retailer').value.trim();
    const location = document.getElementById('location').value.trim();
    const date = document.getElementById('photo_date').value;
    const imageDescription = document.getElementById('imageDescription').value.trim();
    const comments = document.getElementById('comments').value.trim();
    const files = selectedFiles;
    const imgTypeChecked = [...document.querySelectorAll('input[name="img_type"]:checked')];
    const otherChecked = document.getElementById('otherCheck').checked;
    const otherComment = document.getElementById('otherComment').value.trim();
    const secondaryChecked = document.getElementById('secondaryCheck').checked;
    const secondaryType = document.getElementById('secondaryType').value;
    const secondaryOther = document.getElementById('secondaryOther').value.trim();
    const products = [...document.querySelectorAll('input[name="product"]:checked')].map(c => c.value);

    if (!country) return showError('Please select a country.');
    if (!retailer || !location || !date) return showError('Please fill in all required store details.');
    if (imgTypeChecked.length === 0) return showError('Please select at least one image type.');
    if (secondaryChecked && !secondaryType) return showError('Please select a secondary placement type.');
    if (secondaryChecked && secondaryType === 'other' && !secondaryOther) return showError('Please describe the secondary placement type.');
    if (otherChecked && !otherComment) return showError('Please describe the "Other" image type.');
    if (products.length === 0) return showError('Please select at least one product on display.');
    if (!imageDescription) return showError('Please provide an image description.');
    if (!files || !files.length) return showError('Please select at least one file to upload.');


    const imgTypeMap = { 'Sundae on-shelf': 'shelf', 'Competitor product': 'competitor', 'other': 'other' };
    const imgTypeCodes = imgTypeChecked.map(c => {
      if (c.value === 'Sundae secondary placement display') {
        const secLabel = secondaryType === 'other' ? slugify(secondaryOther) : secondaryType;
        return 'secondary' + (secLabel ? '_' + secLabel : '');
      }
      return imgTypeMap[c.value] || 'other';
    }).join('_');

    const imgTypesDisplay = imgTypeChecked.map(c => {
      if (c.value === 'Sundae secondary placement display') {
        const secLabel = secondaryType === 'other' ? secondaryOther : secondaryType;
        return 'Sundae secondary placement display' + (secLabel ? ' (' + secLabel + ')' : '');
      }
      return c.value === 'other' ? 'Other: ' + otherComment : c.value;
    });

    const productCodes = products.join('_') || 'NoProduct';
    const prefix = [slugify(country), slugify(retailer), slugify(location), productCodes, imgTypeCodes, slugify(date)].join('_');

    const btn = document.getElementById('uploadBtn');
    btn.disabled = true; btn.textContent = 'Uploading…';
    hideMessages(); showProgress(0);

    try {
      await getDropboxToken();
      const total = files.length + 1;
      let done = 0;
      let fileIndex = 1;
      const imageLinks = [];
      const isMultiple = files.length > 1;
      const folderPath = DROPBOX_FOLDER + '/' + slugify(country) + '/' + slugify(retailer) + '/' + prefix;

      for (const file of Array.from(files)) {
        const ext = file.name.includes('.') ? file.name.split('.').pop() : '';
        const newName = prefix + '_' + fileIndex + (ext ? '.' + ext : '');
        const filePath = isMultiple ? folderPath + '/' + newName : DROPBOX_FOLDER + '/' + slugify(country) + '/' + slugify(retailer) + '/' + newName;
        await uploadToDropbox(file, filePath);
        if (!isMultiple) {
          const link = await getDropboxLink(filePath);
          if (link) imageLinks.push(link);
        }
        done++; fileIndex++;
        showProgress(Math.round((done / total) * 100));
      }

      if (isMultiple) {
        const folderLink = await getDropboxLink(folderPath);
        if (folderLink) imageLinks.push(folderLink);
      }

      // Summary txt
      const summary = [
        'SUNDAE PHOTO SUBMISSION SUMMARY',
        '================================',
        'Submitted: ' + new Date().toLocaleString(),
        '', 'TYPE OF IMAGE:', imgTypesDisplay.map(t => '  - ' + t).join('\n'),
        '', 'STORE DETAILS:',
        '  Country:        ' + country,
        '  Retailer:       ' + retailer,
        '  Store location: ' + location,
        '  Date taken:     ' + date,
        '', 'PRODUCTS ON DISPLAY:', products.length ? products.map(p => '  - ' + p).join('\n') : '  None selected',
        '', 'ADDITIONAL COMMENTS:', comments || '  None',
        '', 'FILES UPLOADED:', Array.from(files).map((f, i) => '  - ' + prefix + '_' + (i+1) + '.' + f.name.split('.').pop()).join('\n'),
        '', 'IMAGE LINKS:', imageLinks.length ? imageLinks.join('\n') : '  None'
      ].join('\n');

      const summaryBlob = new Blob([summary], { type: 'text/plain' });
      const summaryPath = isMultiple ? folderPath + '/' + prefix + '_summary.txt' : DROPBOX_FOLDER + '/' + slugify(country) + '/' + slugify(retailer) + '/' + prefix + '_summary.txt';
      await uploadToDropbox(new File([summaryBlob], prefix + '_summary.txt'), summaryPath);
      done++; showProgress(100);

      // Send to Google Sheets
      await fetch(SHEETS_URL, {
        method: 'POST',
        mode: 'no-cors',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          dateSubmitted: new Date().toLocaleString(),
          country, retailer,
          storeLocation: location,
          datePhotoTaken: date,
          imageType: imgTypesDisplay.join(', '),
          secondaryPlacementType: secondaryChecked ? (secondaryType === 'other' ? secondaryOther : secondaryType) : 'N/A',
          products: products.join(', '),
          imageDescription,
          comments,
          filesUploaded: Array.from(files).map((f, i) => prefix + '_' + (i+1) + '.' + f.name.split('.').pop()).join(', '),
          imageLinks: imageLinks.join(', ')
        })
      });

      document.getElementById('successMsg').style.display = 'block';
      resetForm();
    } catch (err) {
      showError('Upload failed: ' + err.message);
    } finally {
      btn.disabled = false; btn.textContent = 'Upload';
      setTimeout(() => hideProgress(), 1500);
    }
  }

  function showProgress(pct) { document.getElementById('progressWrap').style.display = 'block'; document.getElementById('progressBar').style.width = pct + '%'; }
  function hideProgress() { document.getElementById('progressWrap').style.display = 'none'; }
  function showError(msg) { const el = document.getElementById('errorMsg'); el.textContent = '✕ ' + msg; el.style.display = 'block'; }
  function hideMessages() { document.getElementById('successMsg').style.display = 'none'; document.getElementById('errorMsg').style.display = 'none'; }

  function resetForm() {
    document.querySelectorAll('input[type="checkbox"]').forEach(c => c.checked = false);
    document.getElementById('secondaryOptions').style.display = 'none';
    document.getElementById('secondaryType').value = '';
    document.getElementById('secondaryOtherBox').style.display = 'none';
    document.getElementById('secondaryOther').value = '';
